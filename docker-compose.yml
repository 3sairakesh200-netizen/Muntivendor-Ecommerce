version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: multivendor_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=multivendor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_pass_99
    ports:
      - "5432:5432"
    restart: always

  web:
    build: .
    container_name: multivendor_web
    command: >
      sh -c "python manage.py migrate &&
             gunicorn multivendor.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=multivendor
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_pass_99
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=django-secure-production-ready-key-7729188
      - DJANGO_ALLOWED_HOSTS=*
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
